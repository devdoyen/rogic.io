[nemologic_servers]
# Replace this with your EC2 public IP or use Terraform output to populate
nemologic-app-server ansible_host=43.201.62.53 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/nemologic-key.pem ansible_become_timeout=60 ansible_timeout=60

# --- SSH over SSM (Systems Manager Session Manager) Tunneling Example ---
# 인바운드 SSH(22) 포트 완전 폐쇄 시, SSM Session Manager 터널링으로 Ansible을 기동하기 위해 
# ansible_host에 IP 대신 EC2 인스턴스 ID(i-xxxx)를 적고 ansible_ssh_common_args에 ProxyCommand를 아래와 같이 부여합니다:
#
# nemologic-app-server ansible_host=i-0123456789abcdef0 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/nemologic-key.pem ansible_ssh_common_args='-o ProxyCommand="aws ssm start-session --target %h --document-name AWS-StartSSHSession --parameters portNumber=%p"'
