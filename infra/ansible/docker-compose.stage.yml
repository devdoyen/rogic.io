version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: nemologic-db
    environment:
      POSTGRES_DB: ${DB_NAME:-nemologic}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  frontend:
    image: nginx:alpine
    read_only: true
    user: "nginx"
    group_add:
      - root
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: []
    networks:
      - frontend-net

  backend-blue:
    image: ghcr.io/devdoyen/nemologic-backend:${IMAGE_TAG:-latest}
    container_name: nemologic-backend-blue
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-nemologic}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      AI_API_KEY: ${AI_API_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend-net
      - backend-net

  backend-green:
    image: ghcr.io/devdoyen/nemologic-backend:${IMAGE_TAG:-latest}
    container_name: nemologic-backend-green
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-nemologic}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      AI_API_KEY: ${AI_API_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend-net
      - backend-net

volumes:
  postgres_data:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true


