---
- name: Wait for Cloud-Init and SSH connection
  hosts: nemologic_servers
  gather_facts: false
  tasks:
    - name: Wait for connection
      wait_for_connection:
        timeout: 300
        delay: 5

    - name: Wait for cloud-init to finish
      raw: test -f /var/lib/cloud/instance/boot-finished
      register: cmd_res
      until: cmd_res is success
      retries: 60
      delay: 5
      changed_when: false

- name: Deploy Nemologic App to AWS EC2
  hosts: nemologic_servers
  become: true
  vars:
    ansible_become_timeout: 60
  tasks:
    - name: Check if swap file exists
      stat:
        path: /swapfile
      register: swap_file_check

    - name: Create swap file (1.5GB)
      command: dd if=/dev/zero of=/swapfile bs=1M count=1536
      when: not swap_file_check.stat.exists

    - name: Set permissions on swap file
      file:
        path: /swapfile
        owner: root
        group: root
        mode: '0600'
      when: not swap_file_check.stat.exists

    - name: Make swap file
      command: mkswap /swapfile
      when: not swap_file_check.stat.exists

    - name: Enable swap file
      command: swapon /swapfile
      when: not swap_file_check.stat.exists

    - name: Add swap file to fstab
      mount:
        name: none
        src: /swapfile
        fstype: swap
        opts: sw
        state: present

    - name: Update apt package cache
      apt:
        update_cache: yes
        force_apt_get: yes

    - name: Install prerequisite packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - rsync
          - awscli
          - certbot
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker CE & Docker Compose Plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Configure Docker daemon to use awslogs
      copy:
        content: |
          {
            "log-driver": "awslogs",
            "log-opts": {
              "awslogs-group": "/aws/ec2/nemologic",
              "awslogs-region": "ap-northeast-2",
              "awslogs-create-group": "true"
            }
          }
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: '0644'
      register: docker_daemon_config

    - name: Restart Docker if daemon config changed
      service:
        name: docker
        state: restarted
      when: docker_daemon_config.changed

    - name: Create application directory
      file:
        path: /opt/nemologic
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Remove legacy nested directory if exists
      file:
        path: /opt/nemologic/nemologic
        state: absent

    - name: Deploy application source files to remote host
      synchronize:
        src: "{{ playbook_dir }}/../../"
        dest: /opt/nemologic/
        recursive: yes
        delete: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.gradle"
          - "--exclude=node_modules"
          - "--exclude=infra/terraform/.terraform"
          - "--exclude=backend/build/classes"
          - "--exclude=backend/build/tmp"
          - "--exclude=backend/build/reports"
          - "--exclude=backend/build/test-results"

    - name: Ensure environment configurations are set
      copy:
        content: |
          SPRING_PROFILES_ACTIVE=local
          AI_API_KEY={{ lookup('env', 'AI_API_KEY') }}
          GRAFANA_CLOUD_PROM_URL={{ lookup('env', 'GRAFANA_CLOUD_PROM_URL') }}
          GRAFANA_CLOUD_PROM_USER={{ lookup('env', 'GRAFANA_CLOUD_PROM_USER') }}
          GRAFANA_CLOUD_PROM_TOKEN={{ lookup('env', 'GRAFANA_CLOUD_PROM_TOKEN') }}
        dest: /opt/nemologic/.env
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Deploy production Nginx configuration
      copy:
        src: /opt/nemologic/infra/ansible/nginx.prod.conf
        dest: /opt/nemologic/frontend/nginx.conf
        remote_src: yes
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Deploy production Docker Compose override
      copy:
        src: /opt/nemologic/infra/ansible/docker-compose.prod.yml
        dest: /opt/nemologic/docker-compose.prod.yml
        remote_src: yes
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Check if SSL certificate exists
      stat:
        path: /etc/letsencrypt/live/rotagic.com/fullchain.pem
      register: ssl_cert_check

    - name: Stop frontend container if running (for standalone certbot)
      shell:
        cmd: docker compose -f docker-compose.yml -f docker-compose.prod.yml stop frontend || true
        chdir: /opt/nemologic
      become: true
      when: not ssl_cert_check.stat.exists

    - name: Generate SSL certificate via Certbot (standalone)
      command: >
        certbot certonly --standalone
        -d rotagic.com -d www.rotagic.com -d rogic.io -d www.rogic.io
        --email "{{ lookup('env', 'ALERT_EMAIL') | default('admin@rotagic.com', true) }}"
        --agree-tos
        --non-interactive
      become: true
      when: not ssl_cert_check.stat.exists

    - name: Ensure Certbot renewal-hooks directories exist
      file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - /etc/letsencrypt/renewal-hooks/pre
        - /etc/letsencrypt/renewal-hooks/post

    - name: Deploy Certbot renewal pre-hook
      copy:
        content: |
          #!/bin/bash
          docker compose -f /opt/nemologic/docker-compose.yml -f /opt/nemologic/docker-compose.prod.yml stop frontend
        dest: /etc/letsencrypt/renewal-hooks/pre/stop-frontend.sh
        owner: root
        group: root
        mode: '0755'

    - name: Deploy Certbot renewal post-hook
      copy:
        content: |
          #!/bin/bash
          docker compose -f /opt/nemologic/docker-compose.yml -f /opt/nemologic/docker-compose.prod.yml start frontend
        dest: /etc/letsencrypt/renewal-hooks/post/start-frontend.sh
        owner: root
        group: root
        mode: '0755'

    - name: Start Docker Compose services
      shell:
        cmd: docker compose -f docker-compose.yml -f docker-compose.prod.yml down && docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
        chdir: /opt/nemologic
      become: true

    - name: Create backups directory
      file:
        path: /opt/nemologic/backups
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Deploy DB backup script
      copy:
        content: |
          #!/bin/bash
          # Find backup bucket name automatically from S3 list
          BUCKET_NAME=$(aws s3 ls | grep nemologic-db-backup | head -n1 | awk '{print $3}')
          if [ -z "$BUCKET_NAME" ]; then
              echo "Error: S3 Backup Bucket not found"
              exit 1
          fi

          BACKUP_NAME="db-backup-$(date +%Y%m%d-%H%M%S).sql.gz"
          
          # Dump DB and compress
          docker exec nemologic-db pg_dump -U postgres nemologic | gzip > /tmp/$BACKUP_NAME
          
          # Upload to S3
          aws s3 cp /tmp/$BACKUP_NAME s3://$BUCKET_NAME/postgres/$BACKUP_NAME
          
          # Remove local temp backup file
          rm /tmp/$BACKUP_NAME
        dest: /opt/nemologic/backups/backup_db.sh
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Set up Daily Cron Job for DB Backups (Run daily at 3:00 AM)
      cron:
        name: "nemologic db daily backup"
        minute: "0"
        hour: "3"
        job: "/bin/bash /opt/nemologic/backups/backup_db.sh > /dev/null 2>&1"

