name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: "ap-northeast-2"
  AWS_REGION: "ap-northeast-2"

jobs:
  # 1. CI Phase: Run backend and frontend test suites
  ci:
    name: Run Verification Tests (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Backend Tests
        run: |
          cd backend
          ./gradlew test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm ci
          npm run test -- --run

      - name: Setup Ansible for Syntax Check
        run: |
          sudo apt-get update || true
          sudo apt-get install -y ansible

      - name: Validate Ansible Playbook Syntax (CI)
        run: |
          cd infra/ansible
          ansible-playbook playbook.yml --syntax-check -i localhost,

  # 2. Infra Plan Phase: Dry-run Terraform changes to see impact
  infra-plan:
    name: Terraform Dry-Run (Plan)
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.5'

      - name: Terraform Format & Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd infra/terraform
          terraform fmt -check
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            terraform init
          else
            terraform init -backend=false
          fi

      - name: Check Terraform Plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
          TF_VAR_grafana_url: ${{ secrets.GRAFANA_URL }}
          TF_VAR_grafana_auth: ${{ secrets.GRAFANA_AUTH }}
          TF_VAR_grafana_sm_url: ${{ secrets.GRAFANA_SM_URL }}
          TF_VAR_grafana_sm_token: ${{ secrets.GRAFANA_SM_TOKEN }}
        run: |
          cd infra/terraform
          # Only run plan if AWS credentials are provided
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            terraform plan
          else
            echo "Skipping plan: AWS credentials not configured in secrets."
          fi

      - name: Generate Terraform Graph
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          sudo apt-get update && sudo apt-get install -y graphviz
          cd infra/terraform
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            terraform graph | dot -Tpng > terraform-graph.png
          else
            # Generate a mock empty file or skip graph to avoid crash
            echo "Skipping graph: AWS credentials not configured."
            touch terraform-graph.png
          fi

      - name: Upload Terraform Graph
        uses: actions/upload-artifact@v4
        with:
          name: terraform-architecture-graph
          path: infra/terraform/terraform-graph.png
          retention-days: 7

  # 3. Infra Apply Phase: Applies Terraform changes (Requires Manual Approval)
  infra-apply:
    name: Terraform Infrastructure Apply (Requires Approval)
    needs: infra-plan
    runs-on: ubuntu-latest
    environment: production-infra # Protects this job using manual approvals in GitHub Environments
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.5'

      - name: Terraform Init & Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
          TF_VAR_grafana_url: ${{ secrets.GRAFANA_URL }}
          TF_VAR_grafana_auth: ${{ secrets.GRAFANA_AUTH }}
          TF_VAR_grafana_sm_url: ${{ secrets.GRAFANA_SM_URL }}
          TF_VAR_grafana_sm_token: ${{ secrets.GRAFANA_SM_TOKEN }}
        run: |
          cd infra/terraform
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            terraform init
            terraform apply -auto-approve
          else
            echo "Skipping apply: AWS credentials not configured."
          fi

  # 4. Build Phase: Compile GraalVM Native Image and Frontend Assets
  build:
    name: Build Application (GraalVM & Node)
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 17
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'gradle'

      - name: Build Backend Native Image
        run: |
          cd backend
          ./gradlew nativeCompile

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend Assets
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload Backend Binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/build/native/nativeCompile/nemologic-backend
          retention-days: 1

      - name: Upload Frontend Dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # 5. Deploy Staging Phase: Deploys to Staging Server
  deploy-staging:
    name: Deploy to Staging (Ansible)
    needs: [build, infra-apply]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Staging EC2 Instance
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "ap-northeast-2"
        run: |
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            STAGING_INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=nemologic-staging-server" "Name=instance-state-name,Values=stopped,running" --query "Reservations[*].Instances[*].InstanceId" --output text)
            if [ -n "$STAGING_INSTANCE_ID" ]; then
              echo "Starting Staging EC2 Instance: $STAGING_INSTANCE_ID"
              aws ec2 start-instances --instance-ids $STAGING_INSTANCE_ID
              echo "Waiting for Staging EC2 Instance to be running..."
              aws ec2 wait instance-running --instance-ids $STAGING_INSTANCE_ID
            else
              echo "Staging EC2 Instance not found by name tag 'nemologic-staging-server'."
            fi
          else
            echo "Skipping EC2 start: AWS credentials not configured."
          fi

      - name: Download Backend Binary
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: backend/build/native/nativeCompile

      - name: Make Backend Binary Executable
        run: chmod +x backend/build/native/nativeCompile/nemologic-backend

      - name: Download Frontend Dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup Ansible
        run: |
          sudo apt-get update || true
          sudo apt-get install -y ansible rsync

      - name: Set up SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/nemologic-key.pem
          chmod 400 ~/.ssh/nemologic-key.pem

      - name: Run Ansible Playbook (Staging)
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_TIMEOUT: '60'
          ANSIBLE_BECOME_TIMEOUT: '60'
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GRAFANA_CLOUD_PROM_URL: ${{ secrets.GRAFANA_CLOUD_PROM_URL }}
          GRAFANA_CLOUD_PROM_USER: ${{ secrets.GRAFANA_CLOUD_PROM_USER }}
          GRAFANA_CLOUD_PROM_TOKEN: ${{ secrets.GRAFANA_CLOUD_PROM_TOKEN }}
        run: |
          cd infra/ansible
          STAGING_IP="${{ secrets.EC2_STAGING_IP }}"
          if [ -z "$STAGING_IP" ]; then
            echo "Error: EC2_STAGING_IP secret is not set. Aborting staging deployment to protect production server."
            exit 1
          fi
          echo "[nemologic_servers]" > hosts.ini
          echo "nemologic-app-server ansible_host=$STAGING_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/nemologic-key.pem ansible_become_timeout=60 ansible_timeout=60" >> hosts.ini
          ansible-playbook -i hosts.ini playbook.yml --extra-vars "env=stage"

  # 6. Deploy Production Phase: Deploys to Production Server (Requires Manual Approval Gate)
  deploy-production:
    name: Deploy to Production (Ansible)
    needs: build
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Backend Binary
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: backend/build/native/nativeCompile

      - name: Make Backend Binary Executable
        run: chmod +x backend/build/native/nativeCompile/nemologic-backend

      - name: Download Frontend Dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup Ansible
        run: |
          sudo apt-get update || true
          sudo apt-get install -y ansible rsync

      - name: Set up SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/nemologic-key.pem
          chmod 400 ~/.ssh/nemologic-key.pem

      - name: Run Ansible Playbook (Production)
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_TIMEOUT: '60'
          ANSIBLE_BECOME_TIMEOUT: '60'
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GRAFANA_CLOUD_PROM_URL: ${{ secrets.GRAFANA_CLOUD_PROM_URL }}
          GRAFANA_CLOUD_PROM_USER: ${{ secrets.GRAFANA_CLOUD_PROM_USER }}
          GRAFANA_CLOUD_PROM_TOKEN: ${{ secrets.GRAFANA_CLOUD_PROM_TOKEN }}
        run: |
          cd infra/ansible
          if [ -n "${{ secrets.EC2_IP }}" ]; then
            echo "[nemologic_servers]" > hosts.ini
            echo "nemologic-app-server ansible_host=${{ secrets.EC2_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/nemologic-key.pem ansible_become_timeout=60 ansible_timeout=60" >> hosts.ini
            ansible-playbook -i hosts.ini playbook.yml --extra-vars "env=prod"
          else
            echo "Skipping Production Deploy: EC2_IP secret not set."
          fi
