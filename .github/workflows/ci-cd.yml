name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]



env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: "ap-northeast-2"
  AWS_REGION: "ap-northeast-2"

jobs:
  # 0. Detect File Changes to optimize pipeline execution
  changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Path Filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # 1. CI Phase: Run backend and frontend test suites
  ci:
    name: Run Verification Tests (CI)
    runs-on: ubuntu-latest
    concurrency:
      group: app-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Backend Tests
        run: |
          cd backend
          ./gradlew test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm ci
          npm run test -- --run

      - name: Setup Ansible for Syntax Check
        run: |
          sudo apt-get update || true
          sudo apt-get install -y ansible

      - name: Validate Ansible Playbook Syntax (CI)
        run: |
          cd infra/ansible
          ansible-playbook playbook.yml --syntax-check -i localhost,

  # 2. Staging Infra Plan Phase: Dry-run staging Terraform changes
  infra-plan-staging:
    name: Terraform Staging Dry-Run (Plan)
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    concurrency:
      group: infra-staging-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.5'

      - name: Terraform Format & Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd infra/terraform/envs/staging
          terraform fmt -check
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            terraform init
          else
            terraform init -backend=false
          fi

      - name: Check Terraform Plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        run: |
          cd infra/terraform/envs/staging
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            terraform plan
          else
            echo "Skipping plan: AWS credentials not configured."
          fi

  # 3. Production Infra Plan Phase: Dry-run production Terraform changes
  infra-plan-production:
    name: Terraform Production Dry-Run (Plan)
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    concurrency:
      group: infra-production-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.5'

      - name: Terraform Format & Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd infra/terraform/envs/production
          terraform fmt -check
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            terraform init
          else
            terraform init -backend=false
          fi

      - name: Check Terraform Plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
          TF_VAR_grafana_url: ${{ secrets.GRAFANA_URL }}
          TF_VAR_grafana_auth: ${{ secrets.GRAFANA_AUTH }}
          TF_VAR_grafana_sm_url: ${{ secrets.GRAFANA_SM_URL }}
          TF_VAR_grafana_sm_token: ${{ secrets.GRAFANA_SM_TOKEN }}
        run: |
          cd infra/terraform/envs/production
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            terraform plan
          else
            echo "Skipping plan: AWS credentials not configured."
          fi

  # 4. Staging Infra Apply Phase (Auto-Apply)
  infra-apply-staging:
    name: Terraform Staging Apply (Auto-Apply)
    needs: infra-plan-staging
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
    concurrency:
      group: infra-staging-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.5'

      - name: Terraform Init & Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        run: |
          cd infra/terraform/envs/staging
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            terraform init
            terraform apply -auto-approve
          else
            echo "Skipping apply: AWS credentials not configured."
          fi

  # 5. Production Infra Apply Phase (Requires Manual Approval Gate)
  infra-apply-production:
    name: Terraform Production Apply (Manual Approval)
    needs: [infra-plan-production, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
    concurrency:
      group: infra-production-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.8.5'

      - name: Terraform Init & Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
          TF_VAR_grafana_url: ${{ secrets.GRAFANA_URL }}
          TF_VAR_grafana_auth: ${{ secrets.GRAFANA_AUTH }}
          TF_VAR_grafana_sm_url: ${{ secrets.GRAFANA_SM_URL }}
          TF_VAR_grafana_sm_token: ${{ secrets.GRAFANA_SM_TOKEN }}
        run: |
          cd infra/terraform/envs/production
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            terraform init
            terraform apply -auto-approve
          else
            echo "Skipping apply: AWS credentials not configured."
          fi

  # 4. Build Phase: Compile GraalVM Native Image and Frontend Assets
  build:
    name: Build Application (GraalVM & Node)
    needs: [ci, changes]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
    concurrency:
      group: app-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 17
        if: needs.changes.outputs.backend == 'true'
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'gradle'

      - name: Build Backend Native Image
        if: needs.changes.outputs.backend == 'true'
        run: |
          cd backend
          ./gradlew nativeCompile

      - name: Set up Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend Assets
        if: needs.changes.outputs.frontend == 'true'
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload Frontend Build Artifact
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

      - name: Set Image Tag env
        if: needs.changes.outputs.backend == 'true'
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=sha-${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Log in to GitHub Container Registry (GHCR)
        if: needs.changes.outputs.backend == 'true'
        run: |
          if [ -n "${{ secrets.GHCR_PAT }}" ]; then
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
          else
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          fi

      - name: Build and Push Docker Images
        if: needs.changes.outputs.backend == 'true'
        run: |
          docker build -t ghcr.io/devdoyen/nemologic-backend:latest -t ghcr.io/devdoyen/nemologic-backend:$IMAGE_TAG ./backend
          docker push ghcr.io/devdoyen/nemologic-backend:latest
          docker push ghcr.io/devdoyen/nemologic-backend:$IMAGE_TAG



  # 5. Deploy Staging Phase: Deploys to Staging Server
  deploy-staging:
    name: Deploy to Staging (Ansible)
    needs: [build, infra-apply-staging, changes]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: app-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Staging EC2 Instance
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "ap-northeast-2"
        run: |
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            STAGING_INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=nemologic-staging-server" "Name=instance-state-name,Values=stopped,running" --query "Reservations[*].Instances[*].InstanceId" --output text)
            if [ -n "$STAGING_INSTANCE_ID" ]; then
              echo "Starting Staging EC2 Instance: $STAGING_INSTANCE_ID"
              aws ec2 start-instances --instance-ids $STAGING_INSTANCE_ID
              echo "Waiting for Staging EC2 Instance to be running..."
              aws ec2 wait instance-running --instance-ids $STAGING_INSTANCE_ID
            else
              echo "Staging EC2 Instance not found by name tag 'nemologic-staging-server'."
            fi
          else
            echo "Skipping EC2 start: AWS credentials not configured."
          fi

      - name: Setup Ansible
        run: |
          sudo apt-get update || true
          sudo apt-get install -y ansible rsync

      - name: Set up SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/nemologic-key.pem
          chmod 400 ~/.ssh/nemologic-key.pem

      - name: Set Image Tag env
        run: |
          if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
            if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
              echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
            else
              echo "IMAGE_TAG=sha-${{ github.sha }}" >> $GITHUB_ENV
            fi
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Run Ansible Playbook (Staging)
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_TIMEOUT: '60'
          ANSIBLE_BECOME_TIMEOUT: '60'
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GRAFANA_CLOUD_PROM_URL: ${{ secrets.GRAFANA_CLOUD_PROM_URL }}
          GRAFANA_CLOUD_PROM_USER: ${{ secrets.GRAFANA_CLOUD_PROM_USER }}
          GRAFANA_CLOUD_PROM_TOKEN: ${{ secrets.GRAFANA_CLOUD_PROM_TOKEN }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          cd infra/ansible
          STAGING_IP="${{ secrets.EC2_STAGING_IP }}"
          if [ -z "$STAGING_IP" ]; then
            echo "Error: EC2_STAGING_IP secret is not set. Aborting staging deployment to protect production server."
            exit 1
          fi
          echo "[nemologic_servers]" > hosts.ini
          echo "nemologic-app-server ansible_host=$STAGING_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/nemologic-key.pem ansible_become_timeout=60 ansible_timeout=60" >> hosts.ini
          ansible-playbook -i hosts.ini playbook.yml --extra-vars "env=stage"

      - name: Download Frontend Build Artifact
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy Frontend to S3 (Staging)
        if: needs.changes.outputs.frontend == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "ap-northeast-2"
        run: |
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            STAGE_BUCKET=$(aws s3 ls | grep rogic-frontend-stage | awk '{print $3}')
            if [ -n "$STAGE_BUCKET" ]; then
              echo "Syncing frontend to staging S3 bucket: $STAGE_BUCKET"
              aws s3 sync frontend/dist/ s3://$STAGE_BUCKET/ --delete
              
              STAGE_DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items[?@=='stage.rogic.io']].Id" --output text)
              if [ -n "$STAGE_DIST_ID" ] && [ "$STAGE_DIST_ID" != "None" ]; then
                echo "Invalidating staging CloudFront cache: $STAGE_DIST_ID"
                aws cloudfront create-invalidation --distribution-id $STAGE_DIST_ID --paths "/*"
              else
                echo "CloudFront Distribution for stage.rogic.io not found."
              fi
            else
              echo "S3 staging bucket not found."
            fi
          else
            echo "Skipping S3 sync: AWS credentials not configured."
          fi

  # 6. Deploy Production Phase: Deploys to Production Server (Requires Manual Approval Gate)
  deploy-production:
    name: Deploy to Production (Ansible)
    needs: [build, deploy-staging, infra-apply-production, changes]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
    concurrency:
      group: app-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ansible
        run: |
          sudo apt-get update || true
          sudo apt-get install -y ansible rsync

      - name: Set up SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/nemologic-key.pem
          chmod 400 ~/.ssh/nemologic-key.pem

      - name: Set Image Tag env
        run: |
          if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
            if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
              echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
            else
              echo "IMAGE_TAG=sha-${{ github.sha }}" >> $GITHUB_ENV
            fi
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Run Ansible Playbook (Production)
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_TIMEOUT: '60'
          ANSIBLE_BECOME_TIMEOUT: '60'
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GRAFANA_CLOUD_PROM_URL: ${{ secrets.GRAFANA_CLOUD_PROM_URL }}
          GRAFANA_CLOUD_PROM_USER: ${{ secrets.GRAFANA_CLOUD_PROM_USER }}
          GRAFANA_CLOUD_PROM_TOKEN: ${{ secrets.GRAFANA_CLOUD_PROM_TOKEN }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          cd infra/ansible
          if [ -n "${{ secrets.EC2_IP }}" ]; then
            echo "[nemologic_servers]" > hosts.ini
            echo "nemologic-app-server ansible_host=${{ secrets.EC2_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/nemologic-key.pem ansible_become_timeout=60 ansible_timeout=60" >> hosts.ini
            ansible-playbook -i hosts.ini playbook.yml --extra-vars "env=prod"
          else
            echo "Skipping Production Deploy: EC2_IP secret not set."
          fi

      - name: Download Frontend Build Artifact
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy Frontend to S3 (Production)
        if: needs.changes.outputs.frontend == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "ap-northeast-2"
        run: |
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            PROD_BUCKET=$(aws s3 ls | grep rogic-frontend-prod | awk '{print $3}')
            if [ -n "$PROD_BUCKET" ]; then
              echo "Syncing frontend to production S3 bucket: $PROD_BUCKET"
              aws s3 sync frontend/dist/ s3://$PROD_BUCKET/ --delete
              
              PROD_DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items[?@=='rogic.io']].Id" --output text)
              if [ -n "$PROD_DIST_ID" ] && [ "$PROD_DIST_ID" != "None" ]; then
                echo "Invalidating production CloudFront cache: $PROD_DIST_ID"
                aws cloudfront create-invalidation --distribution-id $PROD_DIST_ID --paths "/*"
              else
                echo "CloudFront Distribution for rogic.io not found."
              fi
            else
              echo "S3 production bucket not found."
            fi
          else
            echo "Skipping S3 sync: AWS credentials not configured."
          fi

  # 7. Release Phase: GitHub Release 생성 및 패치노트 자동화
  create-release:
    name: Create GitHub Release & Changelog
    needs: deploy-production
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
    concurrency:
      group: app-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine and Create Tag
        id: tag_info
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION=${LATEST_TAG#v}
            
            IFS='.' read -r major minor patch <<< "$VERSION"
            
            BUMP="patch"
            if [ "$LATEST_TAG" != "v0.0.0" ]; then
              COMMITS=$(git log ${LATEST_TAG}..HEAD --format=%s)
            else
              COMMITS=$(git log --format=%s)
            fi

            if echo "$COMMITS" | grep -E "BREAKING CHANGE|!" >/dev/null; then
              BUMP="major"
            elif echo "$COMMITS" | grep -E "^feat(\(.*\))?:" >/dev/null; then
              BUMP="minor"
            fi
            
            if [ "$BUMP" = "major" ]; then
              major=$((major + 1))
              minor=0
              patch=0
            elif [ "$BUMP" = "minor" ]; then
              minor=$((minor + 1))
              patch=0
            else
              patch=$((patch + 1))
            fi
            
            NEXT_TAG="v$major.$minor.$patch"
            echo "TAG_NAME=$NEXT_TAG" >> $GITHUB_ENV
            
            git tag $NEXT_TAG
            git push origin $NEXT_TAG
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.TAG_NAME }} \
            --title "Release ${{ env.TAG_NAME }}" \
            --generate-notes

