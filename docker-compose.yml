version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: nemologic-db
    environment:
      POSTGRES_DB: nemologic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nemologic"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Do not expose ports to host to isolate db service within the container network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    container_name: nemologic-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/nemologic
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      AI_API_KEY: ${AI_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nemologic-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
