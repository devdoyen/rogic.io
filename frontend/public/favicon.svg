<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="cellGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="0.8" flood-color="#38bdf8" flood-opacity="0.6"/>
    </filter>
  </defs>
  <g transform="rotate(45 12 12)">
    <!-- Cell 1 (Filled, Top-Left) -->
    <rect x="3.5" y="3.5" width="7.8" height="7.8" rx="1.5" fill="url(#cellGrad)" stroke="#6366f1" stroke-width="0.8" filter="url(#glow)" />
    <!-- Cell 2 (Empty, Top-Right) -->
    <rect x="12.7" y="3.5" width="7.8" height="7.8" rx="1.5" fill="#1e293b" stroke="rgba(255, 255, 255, 0.15)" stroke-width="0.6" />
    <!-- Cell 3 (Empty, Bottom-Left) -->
    <rect x="3.5" y="12.7" width="7.8" height="7.8" rx="1.5" fill="#1e293b" stroke="rgba(255, 255, 255, 0.15)" stroke-width="0.6" />
    <!-- Cell 4 (Filled, Bottom-Right) -->
    <rect x="12.7" y="12.7" width="7.8" height="7.8" rx="1.5" fill="url(#cellGrad)" stroke="#6366f1" stroke-width="0.8" filter="url(#glow)" />
  </g>
</svg>